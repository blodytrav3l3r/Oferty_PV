# HERMES SKILLS MANIFEST v2
# SSoT dla klasyfikacji, capability routing, kosztów i zależności skilli.
#
# v2 zmiany względem v1:
#   - Manifest NIE TRZYMA `load_when` (to rola `classifier.md`)
#   - `cost` jest COMPUTED przy `npm run skills:build-cost` (nie ręczny)
#   - Nowe kategorie: domain, tool, workflow, experimental, deprecated
#   - Każdy skill ma `version` (semver) + opcjonalnie `checksum`
#   - Nowe pole: `capabilities` (zamiast `tags`) — capability router korzysta z niego
#   - Nowe pole: `utility` (0-100) — wybór w budżecie
#   - Typowane `requires` / `optional` / `conflicts` / `before` / `after`
#   - `summary` zostaje; `source` zachowany (z `install_path` resolved przy build)
#
# Konsumenci:
#   - Hermes (przez _router.md)
#   - scripts/skill-cli.mjs (build-cost, plan, validate)
#   - developer (review)

schema_version: 2
schema_changelog:
  - "v2: capabilities + utility + typed deps; cost computed; categories expanded; version+checksum"

# ════════════════════ POLICY ════════════════════

defaults:
  utility: 50            # fallback, gdy skill nie ma zdefiniowanego
  category: feature
  cost_estimator: "approx_tokens = ceil(bytes / 0.75)"   # conservative estimate
  version: "0.1.0"
  auto_load: false
  invoke_only: false

policies:
  cache_loaded:
    enabled: true
    type: session
  max_skills_per_session: 6
  cap_total_cost_tokens: 100000    # jeśli plan > 100k, optymalizuj (drop lowest utility/cost ratio)
  conflict_resolution: error       # jeśli są conflicting skills, abort i pytaj developera

# ════════════════════ CATEGORIES ════════════════════

categories:
  core:
    intent: "Niezbędne do działania projektu. Auto-load."
    cost_policy: "minimum; powinna być 1-2 skille"
  domain:
    intent: "Wiedza dziedzinowa projektu (oferty, cenniki, konfiguracja studni)."
    cost_policy: "duża dopuszczalna"
  feature:
    intent: "Specjalistyczny playbook (excel-debug, multi-agent, debug)."
    cost_policy: "średnia; selektywnie"
  tool:
    intent: "Narzędzia systemowe (CLI, version-check, db)."
    cost_policy: "mała; specific use"
  workflow:
    intent: "Wieloetapowy proces (release, deploy, audit)."
    cost_policy: "średnia; orchestruje kilka innych"
  heavy:
    intent: ">50KB. Tylko invoke (/graphify, /audit)."
    cost_policy: "warn jeśli auto-load"
  experimental:
    intent: "Nowy skill, nie sprawdzony w produkcji."
    cost_policy: "flag in stats"
  deprecated:
    intent: "Wycofane. CLI powinno warn."
    cost_policy: "N/A"

