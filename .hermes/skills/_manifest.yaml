# ════════════════════ STATS ════════════════════
# Pole emitowane przez `npm run skills:build-cost` -- nie ręcznie.

stats:
  emit_at_build: true
  fields:
    skills_total: int
    by_category: map[str, int]
    by_tier: map[str, int]
    cost_core: int
    cost_total_all_loaded: int
    skills_with_warnings: int
    cycles_found: int
    avg_utility: float
    avg_confidence: float
