# ════════════════════ STATS (computed) ════════════════════
# Pole poniżej aktualizowane przez `npm run skills:build-cost` -- nie ręcznie.

stats:
  emit_at_build: true
  fields:
    skills_total: int
    by_category: map[str, int]
    cost_core: int
    cost_feature: int
    cost_domain: int
    cost_tool: int
    cost_workflow: int
    cost_heavy: int
    cost_experimental: int
    cost_deprecated: int
    cost_total_all_loaded: int
    cost_with_cap_budget: int   # z cap_total_cost_tokens
    skills_with_warnings: int
    cycles_found: int
