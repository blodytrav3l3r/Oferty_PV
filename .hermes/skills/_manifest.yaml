# HERMES SKILLS MANIFEST v3
# SSoT dla klasyfikacji, capability routing, provider selection i dynamicznego utility.
#
# v3 zmiany względem v2:
#   - Capabilities NIE SĄ bezpośrednio skille - capabilities to SERVICE.
#     Skills są implementacjami (Provider Pattern).
#   - Nowe pole providers: capability -> implementations[] (ranking by tier)
#   - Nowe pole tier: standard / pro / lite (alternative implementations)
#   - Nowe pole replaces: deprecated skills supercedes
#   - Nowe pole utility_state: dynamic utility (base + history + success + recency)
#   - Nowe pole soft_requires: opcjonalna dep which może być pominięta przy małym budget
#   - Nowe pole confidence/latency_ms: dla budget optimizer multicriteria
#   - Nowe pole checksum, last_updated: dla cache invalidation
#
# Stary manifest v2 zachowany w `_manifest.v2.yaml.bak`.

schema_version: 3
schema_changelog:
  - "v3: Provider Pattern; capability jako service; tier/replaces; dynamic utility; multicriteria budget"

# ════════════════════ DEFAULT POLICY ════════════════════

defaults:
  utility: 50
  utility_state:
    base: 50
    history_bonus: 0
    success_rate_bonus: 0
    recency_penalty: 0
    total: 50
    last_updated: "2026-07-03T00:00:00Z"
  category: feature
  cost_estimator: "approx_tokens = ceil(bytes / 0.75)"
  version: "0.1.0"
  auto_load: false
  invoke_only: false
  confidence: 0.7         # 0-1, jak pewny jest skill
  latency_ms: 200         # median estimate

policies:
  cache_loaded:
    enabled: true
    type: session
  max_skills_per_session: 6
  cap_total_cost_tokens: 100000
  conflict_resolution: error
  budget_weights:           # multicriteria weighting
    cost: 0.5
    utility: 0.3
    confidence: 0.15
    latency: 0.05           # normalized -1/latency_ms
  provider_strategy:
    prefer_tier: standard  # gdy nic nie jest wybrane
    allow_pro_when_over_budget: true   # do decyzji runtime

# ════════════════════ CATEGORIES ════════════════════

categories:
  core:
    intent: "Niezbędne do działania projektu. Auto-load."
  domain:
    intent: "Wiedza dziedzinowa projektu."
  feature:
    intent: "Specjalistyczny playbook."
  tool:
    intent: "Narzędzia systemowe."
  workflow:
    intent: "Wieloetapowy proces."
  heavy:
    intent: ">50KB. Tylko invoke."
  experimental:
    intent: "Nowy, nie zwalidowany."
  deprecated:
    intent: "Wycofane. CLI powinien warn."

# ════════════════════ PROVIDERS ════════════════════
#
# Capabilities NIE SĄ skillami - to są SERVICES.
# Skills mają `tier: standard/pro/lite` - alternative implementations.
#
# W provider_model jest deklaratywna mapa capability -> set implementacji.

providers:
  excel-debug:
    implementations:
      - skill_id: excel-debug
        tier: standard
        confidence: 0.85
        latency_ms: 200
      - skill_id: excel-debug-pro
        tier: pro
        confidence: 0.96
        latency_ms: 100
    default_tier: standard
    upgrade_tier_on_budget: pro

  planning:
    implementations:
      - skill_id: plan-lite
        tier: lite
        confidence: 0.65
        latency_ms: 50
      - skill_id: plan
        tier: standard
        confidence: 0.85
        latency_ms: 200
      - skill_id: plan-pro
        tier: pro
        confidence: 0.97
        latency_ms: 250
    default_tier: standard

  debug:
    implementations:
      - skill_id: systematic-debugging
        tier: standard
        confidence: 0.82
      - skill_id: debug-lite
        tier: lite
        confidence: 0.55
    default_tier: standard

