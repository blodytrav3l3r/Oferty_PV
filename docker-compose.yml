version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: witros-oferty
        restart: unless-stopped
        ports:
            - '3000:10000'
        environment:
            - NODE_ENV=production
            - PORT=10000
            - HOST=0.0.0.0
        volumes:
            - witros_data:/var/data
        networks:
            - witros-network
        healthcheck:
            test:
                [
                    'CMD',
                    'node',
                    '-e',
                    "require('http').get('http://localhost:10000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s

volumes:
    witros_data:
        driver: local

networks:
    witros-network:
        driver: bridge
