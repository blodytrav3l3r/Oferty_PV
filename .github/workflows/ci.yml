# CI/CD Pipeline dla WITROS Oferty PV
# Uruchamiany na push (main, develop) i pull_request (main).
# Zadania: lint, typecheck, testy, budowa Docker, weryfikacja wersji i placeholder deploy.

name: CI/CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

jobs:
    lint:
        name: Lint (ESLint + Prettier)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint (backend)
              run: npm run lint

            - name: Run ESLint (frontend)
              run: npm run lint:frontend

            - name: Run Prettier check
              run: npm run format:check

    typecheck:
        name: Typecheck (tsc)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Typecheck backend
              run: npm run typecheck

            - name: Typecheck frontend
              run: npm run typecheck:frontend

    test:
        name: Test (Jest)
        runs-on: ubuntu-latest
        needs: [lint, typecheck]
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm run test:quick

    build:
        name: Build (Docker)
        runs-on: ubuntu-latest
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t witros-oferty:${{ github.sha }} .

            - name: Health check
              run: |
                  docker run -d --name test-container witros-oferty:${{ github.sha }}
                  echo "Sprawdzanie stanu kontenera..."
                  for i in $(seq 1 15); do
                    if docker exec test-container node -e "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" 2>/dev/null; then
                      echo "✅ Health check OK (próba $i)"
                      break
                    fi
                    if [ "$i" -eq 15 ]; then
                      echo "❌ Health check FAILED po 15 próbach"
                      docker logs test-container
                      docker stop test-container && docker rm test-container
                      exit 1
                    fi
                    echo "  Próba $i/15 — oczekiwanie 2s..."
                    sleep 2
                  done
                  docker stop test-container
                  docker rm test-container

    version-check:
        name: Version check (standard-version dry-run)
        runs-on: ubuntu-latest
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Dry-run standard-version
              run: npm run release:dry

    deploy:
        name: Deploy (placeholder)
        runs-on: ubuntu-latest
        needs: [build, version-check]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4

            - name: Deploy to production
              run: echo "Krok wdrożenia — skonfiguruj strategię deploy (np. Render, SSH, Docker registry)"
