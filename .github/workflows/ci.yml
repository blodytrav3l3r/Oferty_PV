name: CI/CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

jobs:
    commitlint:
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Validate commit messages
              run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint (backend)
              run: npm run lint

            - name: Run ESLint (frontend)
              run: npm run lint:frontend

            - name: Run Prettier check
              run: npm run format:check

    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Typecheck backend
              run: npm run typecheck

            - name: Typecheck frontend
              run: npm run typecheck:frontend

    test:
        runs-on: ubuntu-latest
        needs: [lint, typecheck]
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test

            - name: Upload coverage
              uses: codecov/codecov-action@v7
              with:
                  files: ./coverage/lcov.info
                  fail_ci_if_error: false

    build:
        runs-on: ubuntu-latest
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t witros-oferty:${{ github.sha }} .

            - name: Test Docker image
              run: |
                  docker run -d --name test-container witros-oferty:${{ github.sha }}
                  echo "Waiting for container to become healthy..."
                  for i in $(seq 1 15); do
                    if docker exec test-container node -e "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" 2>/dev/null; then
                      echo "✅ Health check passed on attempt $i"
                      break
                    fi
                    if [ "$i" -eq 15 ]; then
                      echo "❌ Health check failed after 15 attempts"
                      docker logs test-container
                      docker stop test-container && docker rm test-container
                      exit 1
                    fi
                    echo "  Attempt $i/15 — waiting 2s..."
                    sleep 2
                  done
                  docker stop test-container
                  docker rm test-container

    deploy:
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4

            - name: Deploy to production
              run: echo "Deployment step - configure your deployment strategy"
