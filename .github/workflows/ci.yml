# CI/CD Pipeline dla WITROS Oferty PV
# - push na develop → lint + typecheck + testy + deploy na test
# - push na main → lint + typecheck + testy + Docker build + weryfikacja + deploy na produkcję
# - PR na main → lint + typecheck + testy

name: CI/CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

jobs:
    lint:
        name: Lint (ESLint + Prettier)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint (backend)
              run: npm run lint

            - name: Run ESLint (frontend)
              run: npm run lint:frontend

            - name: Run Prettier check
              run: npm run format:check

    typecheck:
        name: Typecheck (tsc)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Typecheck backend
              run: npm run typecheck

            - name: Typecheck frontend
              run: npm run typecheck:frontend

    test:
        name: Test (Jest)
        runs-on: ubuntu-latest
        needs: [lint, typecheck]
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm run test:quick

    docker-build:
        name: Docker build + health check
        runs-on: ubuntu-latest
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t witros-oferty:${{ github.sha }} .

            - name: Health check
              run: |
                  docker run -d --name test-container witros-oferty:${{ github.sha }}
                  echo "Sprawdzanie stanu kontenera..."
                  for i in $(seq 1 15); do
                    if docker exec test-container node -e "require('http').get('http://localhost:10000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" 2>/dev/null; then
                      echo "[OK] Health check OK (proba $i)"
                      break
                    fi
                    if [ "$i" -eq 15 ]; then
                      echo "[FAIL] Health check nie powiodl sie po 15 probach"
                      docker logs test-container
                      docker stop test-container && docker rm test-container
                      exit 1
                    fi
                    echo "  Proba $i/15 — oczekiwanie 2s..."
                    sleep 2
                  done
                  docker stop test-container
                  docker rm test-container

    version-check:
        name: Version check (standard-version dry-run)
        runs-on: ubuntu-latest
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Dry-run standard-version
              run: npm run release:dry

    deploy-test:
        name: Deploy — test (develop)
        runs-on: ubuntu-latest
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        environment: test
        steps:
            - uses: actions/checkout@v4

            - name: Deploy to Render (test)
              if: ${{ secrets.RENDER_TEST_DEPLOY_HOOK != '' }}
              run: |
                  curl -s -X POST "${{ secrets.RENDER_TEST_DEPLOY_HOOK }}" | echo "  Triggered: $(cat)"

            - name: Skip — brak RENDER_TEST_DEPLOY_HOOK
              if: ${{ secrets.RENDER_TEST_DEPLOY_HOOK == '' }}
              run: echo "[INFO] Pomijam deploy testowy — ustaw RENDER_TEST_DEPLOY_HOOK w secrets"

    deploy-production:
        name: Deploy — produkcja (main)
        runs-on: ubuntu-latest
        needs: [docker-build, version-check]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        environment: production
        steps:
            - uses: actions/checkout@v4

            - name: Deploy to Render (production)
              if: ${{ secrets.RENDER_PROD_DEPLOY_HOOK != '' }}
              run: |
                  curl -s -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}" | echo "  Triggered: $(cat)"

            - name: Skip — brak RENDER_PROD_DEPLOY_HOOK
              if: ${{ secrets.RENDER_PROD_DEPLOY_HOOK == '' }}
              run: echo "[INFO] Pomijam deploy produkcyjny — ustaw RENDER_PROD_DEPLOY_HOOK w secrets"
