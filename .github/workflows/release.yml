# Workflow: Release
# Uruchamiany po pushu taga zgodnego z v* (np. v1.0.0, v1.1.0)
# Buduje, testuje i tworzy GitHub Release z automatycznymi notatkami.

name: Release

on:
    push:
        tags:
            - 'v*'

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Typecheck
              run: npm run typecheck

            - name: Run tests
              run: npm run test:quick

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  make_latest: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
