<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Aplikacja do tworzenia ofert handlowych na rury WITROS - betonowe, żelbetowe, jajowe"
        />
        <title>WITROS — Generator Ofert</title>
        <link rel="stylesheet" href="css/style.base.css?v=1.8.0" />
        <link rel="stylesheet" href="css/style.cards.css?v=1.8.0" />
        <link rel="stylesheet" href="css/style.responsive.css?v=1.8.0" />
        <link rel="stylesheet" href="css/style.utilities.css?v=1.8.0" />
        <link rel="stylesheet" href="css/rury.css?v=1.8.0" />
        <link rel="stylesheet" href="css/printModal.css?v=1.8.0" />
    </head>

    <body>
        <div id="partial-header" data-partial="partials/rury/header.html"></div>

        <main class="main">
            <!-- ===== SECTION: NEW OFFER (WIZARD) ===== -->
            <div class="section active" id="section-builder">
                <div id="partial-wizard-nav" data-partial="partials/rury/wizard-nav.html"></div>

                <div id="partial-step1" data-partial="partials/rury/step1-client.html"></div>

                <div id="partial-step2" data-partial="partials/rury/step2-products.html"></div>

                <div id="partial-step3" data-partial="partials/rury/step3-offer-summary.html"></div>

                <div id="partial-step4" data-partial="partials/rury/step4-build-card.html"></div>

                <div id="partial-step5" data-partial="partials/rury/step5-order.html"></div>
            </div>

            <div id="partial-offer" data-partial="partials/rury/offer.html"></div>

            <div id="partial-pricelist" data-partial="partials/rury/pricelist.html"></div>

            <!-- ===== WSPÓLNY DOLNY PASEK NAWIGACJI ===== -->
            <div class="wizard-nav wizard-nav-fixed" id="wizard-bottom-nav">
                <div class="wizard-nav-left">
                    <button
                        class="wizard-btn wizard-btn-prev"
                        id="wizard-nav-prev"
                        onclick="phasePrev()"
                    >
                        <i data-lucide="chevron-left"></i> Wstecz
                    </button>
                </div>
                <span class="wizard-step-info" id="wizard-nav-step-info">Krok 1 z 5</span>
                <div class="wizard-nav-right">
                    <button
                        class="wizard-btn wizard-btn-next"
                        id="wizard-nav-next"
                        onclick="phaseNext()"
                    >
                        <i data-lucide="chevron-right"></i> Dalej
                    </button>
                </div>
            </div>

            <div id="partial-summary-bar" data-partial="partials/rury/summary-bar.html"></div>
        </main>

        <!-- Toast container -->
        <div id="toast-container" class="toast-container"></div>

        <script src="js/shared/xlsx.full.min.js?v=1.8.0"></script>
        <script src="js/shared/formatters.js?v=1.8.0"></script>
        <script src="js/shared/auth.js?v=1.8.0"></script>
        <script src="js/shared/logger.js?v=1.8.0"></script>
        <script src="js/shared/constants.js?v=1.8.0"></script>
        <script src="js/shared/ui.js?v=1.8.0"></script>
        <script src="js/shared/api.js?v=1.8.0"></script>
        <script src="js/shared/clientManager.js?v=1.8.0"></script>
        <script src="js/rury/productMetadata.js?v=1.8.0"></script>
        <!-- AppState singleton — centralny stan modułu Rury (Faza 4) -->
        <script src="js/shared/appState.js?v=1.8.0"></script>
        <!-- Moduły wydzielone z app.js (Faza 1 refaktoryzacji) -->
        <script src="js/rury/productHelpers.js?v=1.8.0"></script>
        <script src="js/rury/dataService.js?v=1.8.0"></script>
        <script src="js/rury/transport.js?v=1.8.0"></script>
        <!-- Helpery oferty rur -->
        <script src="js/rury/offerItemHelpers.js?v=1.8.0"></script>
        <!-- UI katalogu produktów -->
        <script src="js/rury/catalogUi.js?v=1.8.0"></script>
        <!-- PEHD wkładki do rur -->
        <script src="js/rury/offerPehd.js?v=1.8.0"></script>
        <!-- Nawigacja sekcji -->
        <script src="js/rury/offerNavigation.js?v=1.8.0"></script>
        <!-- Aktualizacja/usuwanie pozycji -->
        <script src="js/rury/offerUpdateItems.js?v=1.8.0"></script>
        <!-- Synchronizacja uszczelek i zabezpieczenia transportu -->
        <script src="js/rury/offerSync.js?v=1.8.0"></script>
        <!-- Dodawanie pozycji -->
        <script src="js/rury/offerAddItems.js?v=1.8.0"></script>
        <!-- Selekcja pozycji do zamówienia -->
        <script src="js/rury/offerOrderSelection.js?v=1.8.0"></script>
        <!-- Renderowanie tabeli oferty -->
        <script src="js/rury/offerRendering.js?v=1.8.0"></script>
        <script src="js/rury/offerItems.js?v=1.8.0"></script>
        <script src="js/rury/offerCrudHelpers.js?v=1.8.0"></script>
        <script src="js/rury/offerCrud.js?v=1.8.0"></script>
        <script src="js/rury/offerExportsHelpers.js?v=1.8.0"></script>
        <script src="js/rury/offerExports.js?v=1.8.0"></script>
        <script src="js/rury/pricelistUi.js?v=1.8.0"></script>
        <script src="js/rury/wizard.js?v=1.8.0"></script>
        <!-- Moduły zamówień rur (wydzielone z orderManager.js) -->
        <script src="js/rury/orderItems.js?v=1.8.0"></script>
        <script src="js/rury/orderPrzejscia.js?v=1.8.0"></script>
        <script src="js/rury/orderCrud.js?v=1.8.0"></script>
        <script src="js/rury/orderEditMode.js?v=1.8.0"></script>
        <script src="js/rury/orderSummary.js?v=1.8.0"></script>
        <script src="js/rury/orderKartaBudowy.js?v=1.8.0"></script>
        <script src="js/rury/orderManager.js?v=1.8.0"></script>
        <script src="js/rury/offerPrintManager.js?v=1.8.0"></script>
        <script src="js/shared/printModal.js?v=1.8.0"></script>
        <script src="js/rury/offerSummaryTab.js?v=1.8.0"></script>
        <script src="js/app.js?v=1.8.0"></script>
        <script src="js/shared/iconsSlim.js?v=1.8.0"></script>

        <!-- Wersja aplikacji przeniesiona do toolbara SPA (app.html / #app-version-toolbar) -->
        <script src="js/rury/redirectRury.js?v=1.8.0"></script>

        <div id="partial-transport-modal" data-partial="partials/rury/transport-modal.html"></div>
        <script src="js/studnie/partialLoader.js?v=1.8.0"></script>
    </body>
</html>
