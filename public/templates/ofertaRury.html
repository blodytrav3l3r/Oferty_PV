<!doctype html>
<html lang="pl">

<head>
    <meta charset="UTF-8" />
    <title>Oferta {{NR_OFERTY}}</title>
    <style>
        @page { size: A4 portrait; margin: 0mm 10mm; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: Arial, sans-serif;
            font-size: 11pt;
            color: #1e293b;
            background: #fff;
            line-height: 1.5;
        }
        .page { width: 100%; max-width: 190mm; margin: 0 auto; }

        .letterhead-header { width: 100%; display: block; margin-bottom: 14px; }
        .letterhead-footer { width: 100%; display: block; margin-top: 24px; page-break-inside: avoid; }

        /* ===== TYTUL DOKUMENTU ===== */
        .offer-title {
            font-size: 20pt;
            font-weight: 800;
            color: #1e3a8a;
            text-align: center;
            margin: 16px 0 0;
            letter-spacing: 0.3px;
        }
        .offer-title-accent {
            width: 80px;
            height: 3px;
            background: #2563eb;
            margin: 8px auto 14px;
        }

        /* ===== META (daty) ===== */
        .offer-meta {
            display: flex; justify-content: space-between;
            font-size: 10.5pt; margin-bottom: 12px;
            padding-bottom: 8px; border-bottom: 1.5px solid #e2e8f0;
        }
        .offer-meta strong { color: #1e3a8a; font-weight: 700; }

        /* ===== INFO GRID (klient + inwestycja) ===== */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .info-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-left: 3px solid #2563eb;
            border-radius: 6px;
            padding: 10px 12px 10px 14px;
            font-size: 10pt;
        }
        .info-box h3 {
            font-size: 9pt;
            color: #1e3a8a;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.6px;
        }
        .info-box div { margin-bottom: 2px; }

        /* ===== SEKCJE (kategorie / srednice) ===== */
        .cat-section { margin-bottom: 16px; }
        .cat-header {
            font-size: 11pt; font-weight: 700; color: #1e3a8a;
            border-bottom: 1.5px solid #1e3a8a;
            padding-bottom: 4px; margin-bottom: 8px;
            letter-spacing: 0.2px;
        }
        .diam-header {
            font-size: 10pt; font-weight: 700; color: #475569;
            margin: 8px 0 4px;
            padding-left: 4px;
        }

        /* ===== TABELE POZYCJI ===== */
        table.offer-table { width: 100%; border-collapse: collapse; font-size: 9pt; margin-bottom: 6px; }
        table.offer-table th {
            background: #1e3a8a;
            color: #fff;
            padding: 6px 6px;
            text-align: center;
            font-size: 8.5pt;
            font-weight: 700;
            border: 0.5pt solid #1e3a8a;
            letter-spacing: 0.3px;
        }
        table.offer-table tr { page-break-inside: avoid; }
        table.offer-table td {
            padding: 4px 6px;
            border: 0.5pt solid #e2e8f0;
            vertical-align: middle;
        }
        table.offer-table tr:nth-child(even) { background: #f1f5f9; }
        table.offer-table td.num,
        table.offer-table th.num {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .text-right { text-align: right; font-variant-numeric: tabular-nums; }
        .text-center { text-align: center; }
        .bold { font-weight: 700; }
        .nowrap { white-space: nowrap; }

        .cat-summary-row td {
            background: #e0e7ff;
            font-weight: 700;
            border-top: 1.5pt solid #1e3a8a;
            font-size: 9pt;
            color: #1e3a8a;
        }

        /* ===== PODSUMOWANIE ===== */
        .summary-section { margin-top: 18px; }
        .summary-section h3 {
            font-size: 12pt; font-weight: 700; color: #1e3a8a;
            border-bottom: 1.5px solid #1e3a8a;
            padding-bottom: 4px; margin-bottom: 8px;
            letter-spacing: 0.2px;
        }
        table.summary-table { width: 100%; border-collapse: collapse; font-size: 10.5pt; margin-bottom: 10px; }
        table.summary-table td { padding: 5px 10px; border: 0.5pt solid #e2e8f0; }
        table.summary-table td.num {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        table.summary-table tr.grand-total td {
            background: #1e3a8a;
            color: #fff;
            font-weight: 800;
            font-size: 12pt;
            border: none;
            padding: 8px 10px;
        }

        /* ===== UWAGI / WARUNKI ===== */
        .notes-section { margin-top: 14px; font-size: 10pt; page-break-inside: avoid; }
        .notes-section .note-box { padding: 6px 0; margin-bottom: 8px; }
        .conditions { font-size: 10pt; margin-top: 8px; }
        .conditions div { margin-bottom: 3px; }

        /* ===== STANDARDOWE WARUNKI ===== */
        .standard-terms {
            font-size: 8.5pt;
            margin-top: 18px;
            color: #334155;
            line-height: 1.55;
            text-align: justify;
            padding-bottom: 20px;
        }
        .standard-terms p { margin-top: 8px; }
        .standard-terms > p:first-of-type { color: #475569; }
        .standard-terms table { font-size: 8pt; }

        @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
    </style>
</head>

<body>
    <div class="page">
        <table class="report-container" style="width: 100%; border: none">
            <thead class="report-header" style="display: table-header-group; border: none">
                <tr>
                    <td style="border: none; padding: 0">
                        <img src="{{BASE_URL}}/images/letterhead-header.png" class="letterhead-header" />
                    </td>
                </tr>
            </thead>
            <tfoot class="report-footer" style="display: table-footer-group; border: none">
                <tr>
                    <td style="border: none; padding: 0">
                        <img src="{{BASE_URL}}/images/letterhead-footer.png" class="letterhead-footer" />
                    </td>
                </tr>
            </tfoot>
            <tbody class="report-content" style="border: none">
                <tr>
                    <td style="border: none; padding: 0">
                        <div class="offer-title">{{TYTUL_DOKUMENTU}}</div>
                        <div class="offer-title-accent"></div>
                        <div class="offer-meta">
                            <div style="flex-grow: 1">&nbsp;</div>
                            <div style="text-align: right">
                                <div><strong>Data przygotowania oferty:</strong> {{DATA_OFERTY}}</div>
                                {{VALIDITY_SECTION}}
                            </div>
                        </div>

                        <div class="info-grid">
                            <div class="info-box">
                                <h3>Dane klienta</h3>
                                {{DANE_KLIENTA}}
                            </div>
                            <div class="info-box">
                                <h3>Dane inwestycji</h3>
                                {{DANE_INWESTYCJI}}
                            </div>
                        </div>

                        {{TABELA_POZYCJI}}
                        {{TABELA_TRANSPORTU}}
                        {{PODSUMOWANIE}}
                        {{SEKCJA_UWAGI}}

                        <div class="standard-terms">
                            {{WARUNKI_STATYCZNE}}
                        </div>

                        {{DANE_KONTAKTOWE}}
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
