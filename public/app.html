<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="WITROS — profesjonalny generator ofert handlowych na rury betonowe i studnie żelbetowe."
        />
        <title>WITROS — Generator Ofert</title>
        <link href="css/inter.css?v=1.6.0" rel="stylesheet" />
        <link rel="stylesheet" href="css/style.css?v=1.6.0" />
        <link rel="stylesheet" href="css/spa.css?v=1.6.0" />
    </head>

    <body>
        <!-- ═══════ WSPÓLNY NAGŁÓWEK ═══════ -->
        <header class="header">
            <div class="header-inner">
                <div class="header-left">
                    <div class="logo logo-rury">
                        <svg viewBox="0 0 24 24" fill="none" stroke="url(#lg-spa)" stroke-width="2">
                            <defs>
                                <linearGradient id="lg-spa" x1="0" y1="0" x2="1" y2="1">
                                    <stop offset="0%" class="logo-stop-start" />
                                    <stop offset="100%" class="logo-stop-end" />
                                </linearGradient>
                            </defs>
                            <circle cx="12" cy="12" r="9" />
                            <path d="M12 3v18M3 12h18M7 7l10 10M17 7L7 17" />
                        </svg>
                        <span id="spa-logo-text">WITROS Oferty</span>
                    </div>

                    <!-- Kafle nawigacji na poziomie aplikacji -->
                    <div class="nav-apps" id="spa-nav-apps">
                        <a href="index.html" class="nav-tile">
                            <span class="nav-tile-icon"><i data-lucide="home"></i></span>
                            <span class="nav-tile-text">Pulpit</span>
                        </a>
                        <a href="#/studnie" class="nav-tile" id="spa-app-studnie">
                            <span class="nav-tile-icon"><i data-lucide="cylinder"></i></span>
                            <span class="nav-tile-text">Studnie</span>
                        </a>
                        <a href="#/rury" class="nav-tile" id="spa-app-rury">
                            <span class="nav-tile-icon"
                                ><i data-lucide="cylinder" class="lucide-rotate-n90"></i
                            ></span>
                            <span class="nav-tile-text">Rury</span>
                        </a>
                        <a href="#/kartoteka" class="nav-tile" id="spa-app-kartoteka">
                            <span class="nav-tile-icon"><i data-lucide="archive"></i></span>
                            <span class="nav-tile-text">Kartoteka Ofert</span>
                        </a>
                        <a href="#/zlecenia" class="nav-tile" id="spa-app-zlecenia">
                            <span class="nav-tile-icon"><i data-lucide="factory"></i></span>
                            <span class="nav-tile-text">Zlecenia</span>
                        </a>
                    </div>
                </div>

                <!-- Nawigacja poziomu sekcji (wypełniana dynamicznie przez moduły) -->
                <div class="header-center">
                    <nav class="nav" id="spa-section-nav"></nav>
                </div>

                <div class="header-right">
                    <div class="header-user-info" id="header-user-info">
                        <span class="header-username" id="header-username"></span>
                        <span class="header-role-badge" id="header-role-badge"></span>
                        <span class="app-version-toolbar" id="app-version-toolbar"></span>
                        <span
                            class="connection-dot is-checking"
                            id="connection-dot"
                            title="Sprawdzanie połączenia..."
                        ></span>
                        <button class="logout-btn" id="logout-btn" type="button">Wyloguj</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- ═══════ GŁÓWNY KONTENER WIDOKÓW (iframy wstrzykiwane tutaj) ═══════ -->
        <div id="spa-main"></div>

        <!-- ═══════ WSPÓLNE SKRYPTY (tylko autoryzacja wymagana przez router) ═══════ -->
        <script src="js/shared/auth.js?v=1.6.0"></script>
        <script src="js/shared/logger.js?v=1.6.0"></script>
        <script src="js/shared/constants.js?v=1.6.0"></script>
        <script src="js/shared/cspActions.js?v=1.6.0"></script>
        <script src="js/shared/ui.js?v=1.6.0"></script>

        <!-- ═══════ ROUTER SPA ═══════ -->
        <script src="js/spa/router.js?v=1.6.0"></script>
        <script src="js/shared/iconsSlim.js?v=1.6.0"></script>
        <script src="js/versionDisplay.js?v=1.6.0"></script>
    </body>
</html>
