<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="WITROS — profesjonalny generator ofert handlowych na rury betonowe i studnie żelbetowe."
        />
        <title>WITROS — Generator Ofert</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css?v=1.5" />
        <link rel="stylesheet" href="css/spa.css?v=1.5" />
        <style>
            /* ═══ SPA Iframe Layout ═══ */
            #spa-main {
                position: relative;
                padding: 0;
                margin: 0;
                /* Fill all available vertical space below the header */
                min-height: calc(100vh - 52px);
            }

            .spa-module-iframe {
                width: 100%;
                height: calc(100vh - 52px);
                border: none;
                display: none;
            }

            .spa-module-iframe[style*='display: block'],
            .spa-module-iframe[style*='display:block'] {
                display: block;
            }
        </style>
    </head>

    <body>
        <!-- ═══════ SHARED HEADER ═══════ -->
        <header class="header">
            <div class="header-inner">
                <div class="header-left">
                    <div class="logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="url(#lg-spa)" stroke-width="2">
                            <defs>
                                <linearGradient id="lg-spa" x1="0" y1="0" x2="1" y2="1">
                                    <stop offset="0%" stop-color="#6366f1" />
                                    <stop offset="100%" stop-color="#8b5cf6" />
                                </linearGradient>
                            </defs>
                            <circle cx="12" cy="12" r="9" />
                            <path d="M12 3v18M3 12h18M7 7l10 10M17 7L7 17" />
                        </svg>
                        <span id="spa-logo-text">WITROS Oferty</span>
                    </div>

                    <!-- App-level navigation tiles -->
                    <div class="nav-apps" id="spa-nav-apps">
                        <a href="index.html" class="nav-tile">
                            <span class="nav-tile-icon">🏠</span>
                            <span class="nav-tile-text">Pulpit</span>
                        </a>
                        <a href="#/studnie" class="nav-tile" id="spa-app-studnie">
                            <span class="nav-tile-icon">🏗️</span>
                            <span class="nav-tile-text">Studnie</span>
                        </a>
                        <a href="#/rury" class="nav-tile" id="spa-app-rury">
                            <span class="nav-tile-icon">🔩</span>
                            <span class="nav-tile-text">Rury</span>
                        </a>
                        <a href="#/kartoteka" class="nav-tile" id="spa-app-kartoteka">
                            <span class="nav-tile-icon">🗄️</span>
                            <span class="nav-tile-text">Kartoteka</span>
                        </a>
                        <a href="#/zlecenia" class="nav-tile" id="spa-app-zlecenia">
                            <span class="nav-tile-icon">🏭</span>
                            <span class="nav-tile-text">Zlecenia</span>
                        </a>
                    </div>
                </div>

                <!-- Section-level nav (populated dynamically per module) -->
                <div class="header-center">
                    <nav class="nav" id="spa-section-nav"></nav>
                </div>

                <div class="header-right">
                    <div
                        id="header-user-info"
                        style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem"
                    >
                        <span
                            id="header-username"
                            style="color: var(--text-secondary); font-weight: 500"
                        ></span>
                        <span
                            id="header-role-badge"
                            style="
                                font-size: 0.6rem;
                                padding: 0.15rem 0.5rem;
                                border-radius: 20px;
                                font-weight: 600;
                                text-transform: uppercase;
                                letter-spacing: 0.3px;
                                margin-right: 0.5rem;
                            "
                        ></span>
                        <div
                            id="backend-status-indicator"
                            title="Łączenie z serwerem obliczeniowym..."
                            style="
                                cursor: help;
                                display: none;
                                align-items: center;
                                justify-content: center;
                                padding: 0.35rem;
                                border: 1px solid var(--border-glass);
                                border-radius: 6px;
                                background: var(--bg-glass);
                            "
                        >
                            <span
                                style="
                                    display: inline-block;
                                    width: 10px;
                                    height: 10px;
                                    border-radius: 50%;
                                    background: #fdba74;
                                    box-shadow: 0 0 8px #fdba74;
                                    transition: all 0.3s;
                                "
                            ></span>
                        </div>
                        <button
                            onclick="appLogout()"
                            style="
                                padding: 0.35rem 0.8rem;
                                border: 1px solid var(--border-glass);
                                border-radius: 6px;
                                background: var(--bg-glass);
                                color: var(--text-muted);
                                font:
                                    500 0.75rem 'Inter',
                                    sans-serif;
                                cursor: pointer;
                                transition: all 0.2s;
                            "
                            onmouseenter="
                                this.style.color = '#f87171';
                                this.style.borderColor = '#3a1a1a';
                            "
                            onmouseleave="
                                this.style.color = 'var(--text-muted)';
                                this.style.borderColor = 'var(--border-glass)';
                            "
                        >
                            Wyloguj
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- ═══════ MAIN VIEW CONTAINER (iframes injected here) ═══════ -->
        <div id="spa-main"></div>

        <!-- ═══════ SHARED SCRIPTS (only auth needed for router) ═══════ -->
        <script src="js/shared/auth.js?v=1.6"></script>

        <!-- ═══════ SPA ROUTER ═══════ -->
        <script src="js/spa/router.js?v=1.6"></script>
    </body>
</html>
