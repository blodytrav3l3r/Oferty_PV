<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="WITROS — Kartoteka Ofert. Przeglądaj, filtruj i zarządzaj ofertami na rury i studnie."
        />
        <title>WITROS — Kartoteka Ofert</title>
        <link rel="stylesheet" href="css/style.base.css?v=1.6.0" />
        <link rel="stylesheet" href="css/style.cards.css?v=1.6.0" />
        <link rel="stylesheet" href="css/style.responsive.css?v=1.6.0" />
        <link rel="stylesheet" href="css/style.utilities.css?v=1.6.0" />
    </head>

    <body>
        <!-- HEADER (hidden when inside SPA iframe) -->
        <header class="header">
            <div class="header-inner">
                <div class="header-left">
                    <div class="logo logo-kartoteka">
                        <svg viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="2">
                            <defs>
                                <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
                                    <stop offset="0%" class="logo-stop-start" />
                                    <stop offset="100%" class="logo-stop-end" />
                                </linearGradient>
                            </defs>
                            <circle cx="12" cy="12" r="9" />
                            <path d="M12 3v18M3 12h18M7 7l10 10M17 7L7 17" />
                        </svg>
                        <span>Kartoteka Ofert</span>
                    </div>

                    <div class="nav-apps">
                        <a href="index.html" target="_parent" class="nav-tile">
                            <span class="nav-tile-icon"><i data-lucide="home"></i></span>
                            <span class="nav-tile-text">Pulpit</span>
                        </a>
                        <a href="app.html#/studnie" target="_parent" class="nav-tile">
                            <span class="nav-tile-icon"><i data-lucide="cylinder"></i></span>
                            <span class="nav-tile-text">Studnie</span>
                        </a>
                        <a href="app.html#/rury" target="_parent" class="nav-tile">
                            <span class="nav-tile-icon"
                                ><i data-lucide="cylinder" class="lucide-rotate-n90"></i
                            ></span>
                            <span class="nav-tile-text">Rury</span>
                        </a>
                        <a
                            href="app.html#/kartoteka"
                            target="_parent"
                            class="nav-tile active"
                            style="--nav-accent: var(--warn); --nav-glow: var(--warn-bg)"
                        >
                            <span class="nav-tile-icon"><i data-lucide="archive"></i></span>
                            <span class="nav-tile-text">Kartoteka</span>
                        </a>
                    </div>
                </div>

                <div class="header-right">
                    <div
                        id="header-user-info"
                        style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem"
                    >
                        <span
                            id="header-username"
                            style="color: var(--text-secondary); font-weight: 500"
                        ></span>
                        <span
                            id="header-role-badge"
                            style="
                                font-size: 0.6rem;
                                padding: 0.15rem 0.5rem;
                                border-radius: 20px;
                                font-weight: 600;
                                text-transform: uppercase;
                                letter-spacing: 0.3px;
                                margin-right: 0.5rem;
                            "
                        ></span>
                        <button
                            onclick="appLogout()"
                            style="
                                padding: 0.35rem 0.8rem;
                                border: 1px solid var(--border-glass);
                                border-radius: 6px;
                                background: var(--bg-glass);
                                color: var(--text-muted);
                                font:
                                    500 0.75rem 'Inter',
                                    sans-serif;
                                cursor: pointer;
                                transition: all 0.2s;
                            "
                            onmouseenter="
                                this.style.color = 'var(--danger-hover)';
                                this.style.borderColor = 'var(--danger-bg)';
                            "
                            onmouseleave="
                                this.style.color = 'var(--text-muted)';
                                this.style.borderColor = 'var(--border-glass)';
                            "
                        >
                            Wyloguj
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="main">
            <!-- ===== KARTOTEKA: Full-width offers view ===== -->
            <div class="section active" id="section-kartoteka">
                <div
                    class="app-container"
                    style="max-width: 1900px; margin: 0 auto; padding: 0 0.5rem"
                >
                    <!-- Unified Filter Bar -->
                    <div
                        class="kartoteka-filter-bar"
                        style="
                            display: flex;
                            gap: 1rem;
                            margin-bottom: 1.5rem;
                            flex-wrap: wrap;
                            align-items: center;
                            padding: 0.8rem 1rem;
                            background: var(--bg-glass);
                            border: 1px solid var(--border-glass);
                            border-radius: var(--radius-sm);
                        "
                    >
                        <!-- Type Filters -->
                        <div
                            style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap"
                        >
                            <span
                                style="
                                    font-size: 0.75rem;
                                    color: var(--text-muted);
                                    font-weight: 600;
                                    text-transform: uppercase;
                                    letter-spacing: 0.3px;
                                "
                                >Typ:</span
                            >
                            <button
                                class="btn btn-sm pv-type-filter-btn active"
                                data-type-filter="all"
                                onclick="filterByType('all')"
                                style="
                                    border-radius: 20px;
                                    padding: 0.35rem 0.9rem;
                                    font-size: 0.75rem;
                                "
                            >
                                Wszystkie
                            </button>
                            <button
                                class="btn btn-sm btn-secondary pv-type-filter-btn"
                                data-type-filter="offer"
                                onclick="filterByType('offer')"
                                style="
                                    border-radius: 20px;
                                    padding: 0.35rem 0.9rem;
                                    font-size: 0.75rem;
                                "
                            >
                                <i data-lucide="cylinder" class="lucide-rotate-n90"></i> Rury
                            </button>
                            <button
                                class="btn btn-sm btn-secondary pv-type-filter-btn"
                                data-type-filter="studnia_oferta"
                                onclick="filterByType('studnia_oferta')"
                                style="
                                    border-radius: 20px;
                                    padding: 0.35rem 0.9rem;
                                    font-size: 0.75rem;
                                "
                            >
                                <i data-lucide="cylinder"></i> Studnie
                            </button>
                        </div>

                        <!-- Divider -->
                        <div
                            style="width: 1px; height: 24px; background: var(--border-glass)"
                        ></div>

                        <!-- Status Filters -->
                        <div
                            style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap"
                        >
                            <span
                                style="
                                    font-size: 0.75rem;
                                    color: var(--text-muted);
                                    font-weight: 600;
                                    text-transform: uppercase;
                                    letter-spacing: 0.3px;
                                "
                                >Status:</span
                            >
                            <button
                                class="btn btn-sm pv-filter-btn active"
                                data-filter="all"
                                onclick="
                                    window.pvSalesUI && window.pvSalesUI.setFilterLocalOffers('all')
                                "
                                style="
                                    border-radius: 20px;
                                    padding: 0.35rem 0.9rem;
                                    font-size: 0.75rem;
                                "
                            >
                                Wszystkie
                            </button>
                            <button
                                class="btn btn-sm btn-secondary pv-filter-btn"
                                data-filter="with_order"
                                onclick="
                                    window.pvSalesUI &&
                                        window.pvSalesUI.setFilterLocalOffers('with_order')
                                "
                                style="
                                    border-radius: 20px;
                                    padding: 0.35rem 0.9rem;
                                    font-size: 0.75rem;
                                "
                            >
                                <i data-lucide="package"></i> Z zamówieniem
                            </button>
                            <button
                                class="btn btn-sm btn-secondary pv-filter-btn"
                                data-filter="without_order"
                                onclick="
                                    window.pvSalesUI &&
                                        window.pvSalesUI.setFilterLocalOffers('without_order')
                                "
                                style="
                                    border-radius: 20px;
                                    padding: 0.35rem 0.9rem;
                                    font-size: 0.75rem;
                                "
                            >
                                Bez zamówienia
                            </button>
                        </div>

                        <!-- Divider -->
                        <div style="width:1px; height:24px; background:var(--border-glass)"></div>

                        <!-- User Filter -->
                        <div style="display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap">
                            <span style="font-size:0.75rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.3px;">Opiekun:</span>
                            <button class="btn btn-sm btn-secondary" id="pv-my-offers-btn" style="border-radius:20px; padding:0.35rem 0.9rem; font-size:0.75rem;">
                                <i data-lucide="user-check"></i> Moje
                            </button>
                            <select id="pv-user-filter" class="btn btn-sm" style="border-radius:20px; padding:0.35rem 0.9rem; font-size:0.75rem; appearance:none; -webkit-appearance:none; cursor:pointer; background:var(--bg-glass); border:1px solid var(--border-glass); color:var(--text-primary); min-width:130px;">
                                <option value="">Wszyscy</option>
                            </select>
                        </div>

                        <!-- Divider -->
                        <div style="width:1px; height:24px; background:var(--border-glass)"></div>

                        <!-- Date Filter -->
                        <div style="display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap">
                            <span style="font-size:0.75rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.3px;">Data:</span>
                            <button class="btn btn-sm btn-secondary pv-date-preset-btn" data-date-range="today" style="border-radius:20px; padding:0.35rem 0.9rem; font-size:0.75rem;">Dzisiaj</button>
                            <button class="btn btn-sm btn-secondary pv-date-preset-btn" data-date-range="7d" style="border-radius:20px; padding:0.35rem 0.9rem; font-size:0.75rem;">7 dni</button>
                            <button class="btn btn-sm btn-secondary pv-date-preset-btn" data-date-range="30d" style="border-radius:20px; padding:0.35rem 0.9rem; font-size:0.75rem;">30 dni</button>
                            <button class="btn btn-sm btn-secondary pv-date-preset-btn" data-date-range="month" style="border-radius:20px; padding:0.35rem 0.9rem; font-size:0.75rem;">Ten miesiąc</button>
                            <button class="btn btn-sm btn-secondary" id="pv-date-range-btn" style="border-radius:20px; padding:0.35rem 0.9rem; font-size:0.75rem;">
                                <i data-lucide="calendar"></i> Zakres
                            </button>
                            <button class="btn btn-sm btn-secondary" id="pv-clear-filters-btn" style="border-radius:20px; padding:0.35rem 0.9rem; font-size:0.75rem;">
                                <i data-lucide="x"></i> Wyczyść
                            </button>
                        </div>

                        <!-- Date Range Popover (hidden by default) -->
                        <div id="pv-date-popover" style="display:none; position:fixed; z-index:1000; background:var(--bg-card); border:1px solid var(--border-glass); border-radius:12px; padding:0.75rem 1rem; box-shadow:0 8px 32px rgba(0,0,0,0.3);">
                            <div style="display:flex; gap:0.75rem; align-items:flex-start;">
                                <div style="display:flex; flex-direction:column; gap:0.25rem;">
                                    <label for="pv-date-from" style="font-size:0.65rem; color:var(--text-muted); font-weight:600; text-transform:uppercase;">Od</label>
                                    <input type="date" id="pv-date-from" class="form-input form-input-sm" style="font-size:0.78rem; width:140px;">
                                </div>
                                <div style="display:flex; flex-direction:column; gap:0.25rem;">
                                    <label for="pv-date-to" style="font-size:0.65rem; color:var(--text-muted); font-weight:600; text-transform:uppercase;">Do</label>
                                    <input type="date" id="pv-date-to" class="form-input form-input-sm" style="font-size:0.78rem; width:140px;">
                                </div>
                            </div>
                        </div>

                        <!-- Compact Mode Toggle -->
                        <button
                            class="btn btn-sm btn-secondary"
                            id="btn-compact-mode"
                            onclick="toggleCompactMode()"
                            style="margin-left:auto; border-radius:20px; padding:0.35rem 0.9rem; font-size:0.75rem"
                            title="Przełącz tryb kompaktowy"
                        >
                            <i data-lucide="panel-right-close"></i> Kompakt
                        </button>

                        <!-- Search + Refresh row -->
                        <div
                            style="
                                display: flex;
                                flex: 1;
                                gap: 0.5rem;
                                align-items: center;
                                min-width: 200px;
                            "
                        >
                            <div
                                class="search-box"
                                style="margin: 0; flex: 1; max-width: none; position: relative"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    style="
                                        position: absolute;
                                        left: 0.7rem;
                                        top: 50%;
                                        transform: translateY(-50%);
                                        width: 1rem;
                                        color: var(--text-muted);
                                    "
                                >
                                    <circle cx="11" cy="11" r="7" />
                                    <path d="m21 21-4.35-4.35" />
                                </svg>
                                <label
                                    for="pv-local-search-input"
                                    style="
                                        position: absolute;
                                        width: 1px;
                                        height: 1px;
                                        padding: 0;
                                        margin: -1px;
                                        overflow: hidden;
                                        clip: rect(0, 0, 0, 0);
                                        border: 0;
                                    "
                                    >Szukaj oferty</label
                                >
                                <input
                                    type="text"
                                    id="pv-local-search-input"
                                    class="form-input form-input-sm"
                                    placeholder="Szukaj po numerze oferty, kliencie, NIP, numerze zamówienia..."
                                    style="
                                        font-weight: normal;
                                        padding-left: 2.4rem !important;
                                        width: 100%;
                                        font-size: 0.8rem;
                                    "
                                    oninput="
                                        window.pvSalesUI &&
                                            window.pvSalesUI.filterLocalOffers &&
                                            window.pvSalesUI.filterLocalOffers()
                                    "
                                />
                            </div>

                            <button
                                class="btn btn-secondary btn-sm"
                                onclick="window.pvSalesUI && window.pvSalesUI.loadLocalOffers()"
                                title="Odśwież bazę ofert"
                                style="
                                    border-radius: 20px;
                                    padding: 0.35rem 0.9rem;
                                    font-size: 0.75rem;
                                    flex-shrink: 0;
                                "
                            >
                                <i data-lucide="refresh-cw"></i> Odśwież
                            </button>
                        </div>
                    </div>

                    <!-- IE Toolbar -->
                    <div id="ie-toolbar-host"></div>

                    <!-- Main Offers List -->
                    <section
                        class="card pv-card"
                        style="
                            padding: 1.2rem;
                            background: var(--bg-card);
                            border-radius: 12px;
                            border: 1px solid var(--border-glass);
                            margin-bottom: 2rem;
                        "
                    >
                        <div
                            id="pv-local-offers-list"
                            class="kartoteka-offers-grid"
                            style="display: flex; flex-direction: column; gap: 1rem"
                        >
                            <div
                                style="
                                    text-align: center;
                                    padding: 3rem 2rem;
                                    color: var(--text-muted);
                                    font-style: italic;
                                    background: var(--bg-glass);
                                    border-radius: var(--radius-sm);
                                    border: 1px dashed var(--border-glass);
                                "
                            >
                                <i
                                    data-lucide="archive"
                                    style="
                                        width: 48px;
                                        height: 48px;
                                        opacity: 0.3;
                                        margin-bottom: 1rem;
                                    "
                                ></i>
                                <div style="font-size: 0.9rem">Ładowanie ofert z serwera...</div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <!-- Toast container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Dependencies -->
        <script src="js/shared/formatters.js?v=1.6.0"></script>
        <script src="js/shared/auth.js?v=1.6.0"></script>
        <script src="js/shared/logger.js?v=1.6.0"></script>
        <script src="js/shared/constants.js?v=1.6.0"></script>
        <script src="js/shared/ui.js?v=1.6.0"></script>
        <script>
            if (typeof fetchGlobalUsers === 'function') fetchGlobalUsers();
        </script>
        <script src="js/shared/printModal.js?v=1.6.0"></script>
        <link rel="stylesheet" href="css/printModal.css?v=1.6.0" />
        <script src="js/studnie/offerPrintManager.js?v=1.6.0"></script>
        <script src="js/rury/offerPrintManager.js?v=1.6.0"></script>
        <script type="module" src="js/sales/pvSalesUi.js?v=1.6.0"></script>

        <script src="js/sales/kartotekaInit.js?v=1.6.0"></script>
        <script src="js/shared/iconsSlim.js?v=1.6.0"></script>

        <!-- SheetJS do XLSX -->
        <script src="js/shared/xlsx.full.min.js?v=1.6.0"></script>

        <!-- Import/Eksport ofert (feature flag) -->
        <script src="js/import-export/shared/featureFlag.js?v=1.6.0"></script>
        <script src="js/import-export/shared/xlsxImportShared.js?v=1.6.0"></script>
        <script src="js/import-export/shared/conflictModal.js?v=1.6.0"></script>
        <script src="js/import-export/shared/jsonOfferTransfer.js?v=1.6.0"></script>
        <script src="js/import-export/rury/externalImport.js?v=1.6.0"></script>
        <script src="js/import-export/rury/externalExportTemplate.js?v=1.6.0"></script>
        <script src="js/import-export/rury/transferJson.js?v=1.6.0"></script>
        <script src="js/import-export/studnie/externalImport.js?v=1.6.0"></script>
        <script src="js/import-export/studnie/externalExportTemplate.js?v=1.6.0"></script>
        <script src="js/import-export/studnie/transferJson.js?v=1.6.0"></script>
        <script src="js/sales/pvImportExportToolbar.js?v=1.6.0"></script>

        <!-- Wymuszenie jedynego punktu wejścia: app.html#/<module> -->
        <script>
            if (window.top === window.self) {
                const module =
                    location.pathname
                        .split('/')
                        .pop()
                        .replace(/\.html?$/, '') || 'kartoteka';
                window.location.replace('/app.html#/' + module);
            }
        </script>
    </body>
</html>
