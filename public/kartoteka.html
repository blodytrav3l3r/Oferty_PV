<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="WITROS — Kartoteka Ofert. Przeglądaj, filtruj i zarządzaj ofertami na rury i studnie."
        />
        <title>WITROS — Kartoteka Ofert</title>
        <link rel="stylesheet" href="css/style.css?v=3.0" />
    </head>

    <body>
        <!-- HEADER (hidden when inside SPA iframe) -->
        <header class="header">
            <div class="header-inner">
                <div class="header-left">
                    <div class="logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="2">
                            <defs>
                                <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
                                    <stop offset="0%" stop-color="#f59e0b" />
                                    <stop offset="100%" stop-color="#fbbf24" />
                                </linearGradient>
                            </defs>
                            <circle cx="12" cy="12" r="9" />
                            <path d="M12 3v18M3 12h18M7 7l10 10M17 7L7 17" />
                        </svg>
                        <span>Kartoteka Ofert</span>
                    </div>

                    <div class="nav-apps">
                        <a href="index.html" target="_parent" class="nav-tile">
                            <span class="nav-tile-icon"><i data-lucide="home"></i></span>
                            <span class="nav-tile-text">Pulpit</span>
                        </a>
                        <a href="app.html#/studnie" target="_parent" class="nav-tile">
                            <span class="nav-tile-icon"><i data-lucide="cylinder"></i></span>
                            <span class="nav-tile-text">Studnie</span>
                        </a>
                        <a href="app.html#/rury" target="_parent" class="nav-tile">
                            <span class="nav-tile-icon"><i data-lucide="cylinder" class="lucide-rotate-n90"></i></span>
                            <span class="nav-tile-text">Rury</span>
                        </a>
                        <a
                            href="app.html#/kartoteka"
                            target="_parent"
                            class="nav-tile active"
                            style="--nav-accent: #f59e0b; --nav-glow: #2d2208"
                        >
                            <span class="nav-tile-icon"><i data-lucide="archive"></i></span>
                            <span class="nav-tile-text">Kartoteka</span>
                        </a>
                    </div>
                </div>

                <div class="header-right">
                    <div
                        id="header-user-info"
                        style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem"
                    >
                        <span
                            id="header-username"
                            style="color: var(--text-secondary); font-weight: 500"
                        ></span>
                        <span
                            id="header-role-badge"
                            style="
                                font-size: 0.6rem;
                                padding: 0.15rem 0.5rem;
                                border-radius: 20px;
                                font-weight: 600;
                                text-transform: uppercase;
                                letter-spacing: 0.3px;
                                margin-right: 0.5rem;
                            "
                        ></span>
                        <button
                            onclick="appLogout()"
                            style="
                                padding: 0.35rem 0.8rem;
                                border: 1px solid var(--border-glass);
                                border-radius: 6px;
                                background: var(--bg-glass);
                                color: var(--text-muted);
                                font:
                                    500 0.75rem 'Inter',
                                    sans-serif;
                                cursor: pointer;
                                transition: all 0.2s;
                            "
                            onmouseenter="
                                this.style.color = '#f87171';
                                this.style.borderColor = '#3a1a1a';
                            "
                            onmouseleave="
                                this.style.color = 'var(--text-muted)';
                                this.style.borderColor = 'var(--border-glass)';
                            "
                        >
                            Wyloguj
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="main">
            <!-- ===== KARTOTEKA: Full-width offers view ===== -->
            <div class="section active" id="section-kartoteka">
                <div class="toolbar">
                    <h2 style="font-size: 1rem; font-weight: 700"><i data-lucide="archive"></i> Kartoteka Ofert</h2>
                    <div class="toolbar-spacer"></div>
                    <button
                        class="btn btn-secondary btn-sm"
                        onclick="window.pvSalesUI && window.pvSalesUI.loadLocalOffers()"
                        title="Odśwież bazę ofert"
                    >
                        <i data-lucide="refresh-cw"></i> Odśwież
                    </button>
                </div>

                <div
                    class="app-container"
                    style="max-width: 1900px; margin: 0 auto; padding: 0 0.5rem"
                >
                    <!-- Unified Filter Bar -->
                    <div
                        class="kartoteka-filter-bar"
                        style="
                            display: flex;
                            gap: 1rem;
                            margin-bottom: 1.5rem;
                            flex-wrap: wrap;
                            align-items: center;
                            padding: 0.8rem 1rem;
                            background: var(--bg-glass);
                            border: 1px solid var(--border-glass);
                            border-radius: var(--radius-sm);
                        "
                    >
                        <!-- Type Filters -->
                        <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
                            <span
                                style="
                                    font-size: 0.75rem;
                                    color: var(--text-muted);
                                    font-weight: 600;
                                    text-transform: uppercase;
                                    letter-spacing: 0.3px;
                                "
                            >Typ:</span>
                            <button
                                class="btn btn-sm pv-type-filter-btn active"
                                data-type-filter="all"
                                onclick="filterByType('all')"
                                style="border-radius: 20px; padding: 0.35rem 0.9rem; font-size: 0.75rem;"
                            >
                                Wszystkie
                            </button>
                            <button
                                class="btn btn-sm btn-secondary pv-type-filter-btn"
                                data-type-filter="offer"
                                onclick="filterByType('offer')"
                                style="border-radius: 20px; padding: 0.35rem 0.9rem; font-size: 0.75rem;"
                            >
                                <i data-lucide="cylinder" class="lucide-rotate-n90"></i> Rury
                            </button>
                            <button
                                class="btn btn-sm btn-secondary pv-type-filter-btn"
                                data-type-filter="studnia_oferta"
                                onclick="filterByType('studnia_oferta')"
                                style="border-radius: 20px; padding: 0.35rem 0.9rem; font-size: 0.75rem;"
                            >
                                <i data-lucide="cylinder"></i> Studnie
                            </button>
                        </div>

                        <!-- Divider -->
                        <div style="width: 1px; height: 24px; background: var(--border-glass);"></div>

                        <!-- Status Filters -->
                        <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
                            <span
                                style="
                                    font-size: 0.75rem;
                                    color: var(--text-muted);
                                    font-weight: 600;
                                    text-transform: uppercase;
                                    letter-spacing: 0.3px;
                                "
                            >Status:</span>
                            <button
                                class="btn btn-sm pv-filter-btn active"
                                data-filter="all"
                                onclick="window.pvSalesUI && window.pvSalesUI.setFilterLocalOffers('all')"
                                style="border-radius: 20px; padding: 0.35rem 0.9rem; font-size: 0.75rem;"
                            >
                                Wszystkie
                            </button>
                            <button
                                class="btn btn-sm btn-secondary pv-filter-btn"
                                data-filter="with_order"
                                onclick="window.pvSalesUI && window.pvSalesUI.setFilterLocalOffers('with_order')"
                                style="border-radius: 20px; padding: 0.35rem 0.9rem; font-size: 0.75rem;"
                            >
                                <i data-lucide="package"></i> Z zamówieniem
                            </button>
                            <button
                                class="btn btn-sm btn-secondary pv-filter-btn"
                                data-filter="without_order"
                                onclick="window.pvSalesUI && window.pvSalesUI.setFilterLocalOffers('without_order')"
                                style="border-radius: 20px; padding: 0.35rem 0.9rem; font-size: 0.75rem;"
                            >
                                Bez zamówienia
                            </button>
                        </div>

                        <!-- Compact Mode Toggle -->
                        <button
                            class="btn btn-sm btn-secondary"
                            id="btn-compact-mode"
                            onclick="toggleCompactMode()"
                            style="border-radius: 20px; padding: 0.35rem 0.9rem; font-size: 0.75rem;"
                            title="Przełącz tryb kompaktowy"
                        >
                            <i data-lucide="panel-right-close"></i> Kompakt
                        </button>

                        <!-- Spacer -->
                        <div style="flex: 1; min-width: 20px;"></div>

                        <!-- Search -->
                        <div
                            class="search-box"
                            style="margin: 0; width: 100%; max-width: 320px; position: relative;"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                style="
                                    position: absolute;
                                    left: 0.7rem;
                                    top: 50%;
                                    transform: translateY(-50%);
                                    width: 1rem;
                                    color: var(--text-muted);
                                "
                            >
                                <circle cx="11" cy="11" r="7" />
                                <path d="m21 21-4.35-4.35" />
                            </svg>
                            <input
                                type="text"
                                id="pv-local-search-input"
                                class="form-input form-input-sm"
                                placeholder="Szukaj: firma, NIP, budowa, nr..."
                                style="
                                    font-weight: normal;
                                    padding-left: 2.4rem !important;
                                    width: 100%;
                                    font-size: 0.8rem;
                                "
                                oninput="window.pvSalesUI && window.pvSalesUI.filterLocalOffers && window.pvSalesUI.filterLocalOffers()"
                            />
                        </div>
                    </div>

                    <!-- Main Offers List -->
                    <section
                        class="card pv-card"
                        style="
                            padding: 1.2rem;
                            background: var(--bg-card);
                            border-radius: 12px;
                            border: 1px solid var(--border-glass);
                            margin-bottom: 2rem;
                        "
                    >
                        <div
                            id="pv-local-offers-list"
                            class="kartoteka-offers-grid"
                            style="display: flex; flex-direction: column; gap: 1rem;"
                        >
                            <div
                                style="
                                    text-align: center;
                                    padding: 3rem 2rem;
                                    color: var(--text-muted);
                                    font-style: italic;
                                    background: var(--bg-glass);
                                    border-radius: var(--radius-sm);
                                    border: 1px dashed var(--border-glass);
                                "
                            >
                                <i data-lucide="archive" style="width: 48px; height: 48px; opacity: 0.3; margin-bottom: 1rem;"></i>
                                <div style="font-size: 0.9rem;">Ładowanie ofert z serwera...</div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <!-- Toast container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Dependencies -->
        <script src="js/shared/formatters.js?v=3.0"></script>
        <script src="js/shared/auth.js?v=3.0"></script>
        <script src="js/shared/ui.js?v=3.0"></script>
        <script src="js/studnie/offerPrintManager.js?v=3.0"></script>
        <script type="module" src="js/sales/pvSalesUi.js?v=3.0"></script>

        <script src="js/sales/kartotekaInit.js?v=3.0"></script>
        <script src="js/shared/iconsSlim.js?v=3.0"></script>
</body>
</html>
