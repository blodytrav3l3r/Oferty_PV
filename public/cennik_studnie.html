<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cennik elementów studni betonowych">
    <title>WITROS — Cennik Studni</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: var(--text-primary);
            background: rgba(16, 185, 129, 0.15);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }

        .pricelist-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            overflow: hidden;
        }

        .pricelist-table th,
        .pricelist-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-glass);
            text-align: left;
        }

        .pricelist-table th {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-primary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .pricelist-table tbody tr:last-child td {
            border-bottom: none;
        }

        .pricelist-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .price-val {
            font-weight: 600;
            color: var(--text-primary);
        }

        .dn-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .dn-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-inner">
            <div class="header-left">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="2">
                        <defs>
                            <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#10b981" />
                                <stop offset="100%" stop-color="#059669" />
                            </linearGradient>
                        </defs>
                        <circle cx="12" cy="12" r="9" />
                        <path d="M12 3v18M3 12h18M7 7l10 10M17 7L7 17" />
                    </svg>
                    <span>Cennik Studni</span>
                </div>

                <div
                    style="border-left: 1px solid rgba(255,255,255,0.1); display:flex; gap:0.5rem; padding-left: 0.8rem;">
                    <a href="index.html" class="nav-module-btn">🏠 Pulpit</a>
                    <a href="studnie.html" class="nav-module-btn">🏗️ Studnie</a>
                    <a href="rury.html" class="nav-module-btn">🏗️ Rury</a>
                    <a href="cennik_studnie.html" class="nav-module-btn active" style="color:#10b981;">📋 Cennik
                        Studni</a>
                </div>
            </div>
            <div class="header-center"></div>
            <div class="header-right"></div>
        </div>
    </header>

    <main class="main" style="max-width: 1200px; margin: 0 auto; padding: 2rem 1rem;">
        <div class="card" style="padding: 1.5rem;">
            <div class="tabs" id="dn-tabs">
                <button class="tab-btn active" data-dn="DN1000">DN 1000</button>
                <button class="tab-btn" data-dn="DN1200">DN 1200</button>
                <button class="tab-btn" data-dn="DN1500">DN 1500</button>
                <button class="tab-btn" data-dn="DN2000">DN 2000</button>
            </div>

            <div id="pricelist-container">
                <!-- Tabele będą tutaj wygenerowane przez JS -->
            </div>
        </div>
    </main>

    <script src="js/studnie_pricelist.js"></script>
    <script>
        function getAuthToken() { return localStorage.getItem('authToken'); }
        function authHeaders(extra = {}) {
            const token = getAuthToken();
            const headers = { 'Content-Type': 'application/json', ...extra };
            if (token) headers['X-Auth-Token'] = token;
            return headers;
        }

        async function loadStudnieProducts() {
            try {
                const res = await fetch('/api/studnie-products', { headers: authHeaders() });
                const json = await res.json();
                if (json.data) {
                    window.STUDNIE_DATA = json.data;
                }
            } catch (err) {
                console.error('Błąd ładowania cennika studni:', err);
            }
            renderPricelist();
        }

        async function saveStudnieProducts() {
            try {
                await fetch('/api/studnie-products', {
                    method: 'PUT',
                    headers: authHeaders(),
                    body: JSON.stringify({ data: window.STUDNIE_DATA })
                });
            } catch (err) {
                console.error('Błąd zapisu cennika studni:', err);
            }
        }

        function fmt(n) {
            return n == null ? '—' : Number(n).toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function waga(w) {
            if (!w || w === 0) return '—';
            return w + ' kg';
        }

        function editCell(el, field, dn, itemIndex) {
            if (el.querySelector('input')) return;
            const item = window.STUDNIE_DATA[dn].nadbudowa[itemIndex];
            const oldVal = item[field] ?? '';

            const input = document.createElement('input');
            input.type = (field === 'price' || field === 'weight') ? 'number' : 'text';
            input.className = 'edit-input';
            input.value = oldVal;
            input.style.width = field === 'name' ? '100%' : '100px';
            input.style.padding = '0.3rem';
            input.style.background = 'var(--bg-glass)';
            input.style.color = 'var(--text-primary)';
            input.style.border = '1px solid var(--primary)';
            input.style.borderRadius = '4px';

            el.textContent = '';
            el.appendChild(input);
            input.focus();
            input.select();

            let isSaving = false;
            const save = () => {
                if (isSaving) return;
                isSaving = true;

                let val = input.value;
                if (field === 'price' || field === 'weight') {
                    if (val === '') {
                        val = null;
                    } else {
                        val = val.replace(',', '.');
                        val = Number(val);
                    }
                } else {
                    val = val.trim();
                }

                item[field] = val;
                saveStudnieProducts();
                renderPricelist();
            };

            input.addEventListener('blur', save);
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') save();
                if (e.key === 'Escape') renderPricelist();
            });
        }

        function deleteProduct(dn, itemIndex) {
            if (!confirm('Czy na pewno usunąć ten produkt z cennika nadbudowy?')) return;
            window.STUDNIE_DATA[dn].nadbudowa.splice(itemIndex, 1);
            saveStudnieProducts();
            renderPricelist();
        }

        function copyProduct(dn, itemIndex) {
            const original = window.STUDNIE_DATA[dn].nadbudowa[itemIndex];
            const copied = JSON.parse(JSON.stringify(original));
            copied.id = copied.id ? copied.id + '-KOP' : 'NOWY-KOP';
            copied.name = copied.name + ' (Kopia)';
            window.STUDNIE_DATA[dn].nadbudowa.splice(itemIndex + 1, 0, copied);
            saveStudnieProducts();
            renderPricelist();
        }

        function showAddProductModal() {
            const currentDn = document.querySelector('.tab-btn.active').dataset.dn;

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal" style="background:var(--bg-card); padding:2rem; border-radius:12px; width:450px; border:1px solid var(--border-glass)">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem">
                        <h3 style="margin:0; color:var(--text-primary)">➕ Dodaj nowy produkt do ${currentDn}</h3>
                        <button onclick="this.closest('.modal-overlay').remove()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.2rem">✕</button>
                    </div>
                    <div style="margin-bottom:1rem">
                        <label style="display:block; margin-bottom:0.5rem; color:var(--text-secondary); font-size:0.85rem">Indeks</label>
                        <input id="new-id" type="text" style="width:100%; padding:0.6rem; background:rgba(0,0,0,0.2); border:1px solid var(--border-glass); color:var(--text-primary); border-radius:6px" placeholder="Indeks produktu">
                    </div>
                    <div style="margin-bottom:1rem">
                        <label style="display:block; margin-bottom:0.5rem; color:var(--text-secondary); font-size:0.85rem">Nazwa elementu</label>
                        <input id="new-name" type="text" style="width:100%; padding:0.6rem; background:rgba(0,0,0,0.2); border:1px solid var(--border-glass); color:var(--text-primary); border-radius:6px" placeholder="Pełna nazwa">
                    </div>
                    <div style="display:flex; gap:1rem; margin-bottom:1.5rem">
                        <div style="flex:1">
                            <label style="display:block; margin-bottom:0.5rem; color:var(--text-secondary); font-size:0.85rem">Waga (kg)</label>
                            <input id="new-weight" type="number" style="width:100%; padding:0.6rem; background:rgba(0,0,0,0.2); border:1px solid var(--border-glass); color:var(--text-primary); border-radius:6px" placeholder="np. 1500">
                        </div>
                        <div style="flex:1">
                            <label style="display:block; margin-bottom:0.5rem; color:var(--text-secondary); font-size:0.85rem">Cena Netto (PLN)</label>
                            <input id="new-price" type="number" step="0.01" style="width:100%; padding:0.6rem; background:rgba(0,0,0,0.2); border:1px solid var(--border-glass); color:var(--text-primary); border-radius:6px" placeholder="np. 450.50">
                        </div>
                    </div>
                    <div style="display:flex; justify-content:flex-end; gap:0.5rem">
                        <button onclick="this.closest('.modal-overlay').remove()" style="padding:0.6rem 1rem; border-radius:6px; cursor:pointer; background:transparent; border:1px solid var(--border-glass); color:var(--text-secondary)">Anuluj</button>
                        <button onclick="addNewProductTo('${currentDn}')" style="padding:0.6rem 1.5rem; border-radius:6px; cursor:pointer; background:var(--primary); border:none; color:white; font-weight:600">Dodaj</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if (e.target === overlay) e.target.remove(); });
            document.getElementById('new-id').focus();
        }

        window.addNewProductTo = function (dn) {
            const id = document.getElementById('new-id').value.trim();
            const name = document.getElementById('new-name').value.trim();
            const weightRaw = document.getElementById('new-weight').value;
            const priceRaw = document.getElementById('new-price').value;

            if (!name || !priceRaw) {
                alert('Nazwa i cena są wymagane!');
                return;
            }

            const newItem = {
                id: id,
                name: name,
                weight: weightRaw ? Number(weightRaw) : null,
                price: Number(priceRaw.replace(',', '.'))
            };

            if (!window.STUDNIE_DATA[dn].nadbudowa) window.STUDNIE_DATA[dn].nadbudowa = [];
            window.STUDNIE_DATA[dn].nadbudowa.push(newItem);

            document.querySelector('.modal-overlay').remove();
            saveStudnieProducts();
            renderPricelist();
        };

        function renderPricelist() {
            const container = document.getElementById('pricelist-container');
            let html = '';

            const dns = ['DN1000', 'DN1200', 'DN1500', 'DN2000'];

            dns.forEach((dn, index) => {
                const data = window.STUDNIE_DATA[dn];
                if (!data || !data.nadbudowa) return;

                const tabBtn = document.querySelector(`.tab-btn[data-dn="${dn}"]`);
                const isActive = tabBtn && tabBtn.classList.contains('active') ? 'active' : (index === 0 && !document.querySelector('.tab-btn.active') ? 'active' : '');

                html += `<div id="section-${dn}" class="dn-section ${isActive}">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <h3 style="color: var(--text-primary); font-weight: 500; margin:0;">Elementy Nadbudowy ${dn}</h3>
                        <button onclick="showAddProductModal()" style="padding:0.5rem 1rem; border-radius:6px; cursor:pointer; background:rgba(16,185,129,0.15); border:1px solid var(--primary); color:var(--primary); font-weight:600; font-size:0.85rem; display:flex; align-items:center; gap:0.5rem;"><span>➕</span> Dodaj Produkt</button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="pricelist-table">
                            <thead>
                                <tr>
                                    <th style="width: 15%">Indeks</th>
                                    <th style="width: 40%">Nazwa elementu</th>
                                    <th style="width: 15%">Waga (kg)</th>
                                    <th style="width: 20%">Cena Netto (PLN)</th>
                                    <th style="width: 10%; text-align:center;">Akcje</th>
                                </tr>
                            </thead>
                            <tbody>`;

                data.nadbudowa.forEach((item, itemIndex) => {
                    if (item.name === 'Waga całkowita' || !item.name) return;

                    html += `
                        <tr>
                            <td style="font-family: monospace; color: #94a3b8; cursor:pointer;" onclick="editCell(this, 'id', '${dn}', ${itemIndex})">${item.id || '—'}</td>
                            <td style="font-weight: 500; color: #e2e8f0; cursor:pointer;" onclick="editCell(this, 'name', '${dn}', ${itemIndex})">${item.name}</td>
                            <td style="cursor:pointer;" onclick="editCell(this, 'weight', '${dn}', ${itemIndex})">${waga(item.weight)}</td>
                            <td class="price-val" style="cursor:pointer;" onclick="editCell(this, 'price', '${dn}', ${itemIndex})">${fmt(item.price)} PLN</td>
                            <td style="text-align:center;">
                                <button onclick="copyProduct('${dn}', ${itemIndex})" style="background:none; border:none; cursor:pointer; font-size:1.1rem; padding:0 0.3rem;" title="Kopiuj">📋</button>
                                <button onclick="deleteProduct('${dn}', ${itemIndex})" style="background:none; border:none; cursor:pointer; font-size:1.1rem; padding:0 0.3rem; color:var(--text-muted);" title="Usuń" onmouseover="this.style.color='var(--warn)'" onmouseout="this.style.color='var(--text-muted)'">✕</button>
                            </td>
                        </tr>
                    `;
                });

                html += `
                            </tbody>
                        </table>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
        }

        // Tab switching logic
        document.getElementById('dn-tabs').addEventListener('click', (e) => {
            if (!e.target.classList.contains('tab-btn')) return;

            // Remove active classes
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.dn-section').forEach(sec => sec.classList.remove('active'));

            // Add active to clicked
            e.target.classList.add('active');
            const targetId = 'section-' + e.target.dataset.dn;
            const targetSec = document.getElementById(targetId);
            if (targetSec) targetSec.classList.add('active');
        });

        // Initialize (fetch from server then render)
        loadStudnieProducts();
    </script>
</body>

</html>
