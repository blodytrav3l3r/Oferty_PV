        <!-- HEADER -->
        <header class="header">
            <div class="header-inner">
                <div class="header-left">
                    <div class="logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="url(#lg-s)" stroke-width="2">
                            <defs>
                                <linearGradient id="lg-s" x1="0" y1="0" x2="1" y2="1">
                                    <stop offset="0%" stop-color="#10b981" />
                                    <stop offset="100%" stop-color="#34d399" />
                                </linearGradient>
                            </defs>
                            <rect x="4" y="4" width="16" height="16" rx="2" />
                            <path d="M4 12h16M12 4v16" />
                        </svg>
                        <span>Kalkulator Studni</span>
                    </div>
                    <div class="nav-apps">
                        <a href="index.html" target="_parent" class="nav-tile">
                            <span class="nav-tile-icon"><i data-lucide="home"></i></span>
                            <span class="nav-tile-text">Pulpit</span>
                        </a>
                        <a
                            href="app.html#/studnie"
                            target="_parent"
                            class="nav-tile active"
                            style="--nav-accent: #10b981; --nav-glow: #0f3328"
                        >
                            <span class="nav-tile-icon"><i data-lucide="cylinder"></i></span>
                            <span class="nav-tile-text">Studnie</span>
                        </a>
                        <a href="app.html#/rury" target="_parent" class="nav-tile">
                            <span class="nav-tile-icon"
                                ><i data-lucide="cylinder" class="lucide-rotate-n90"></i
                            ></span>
                            <span class="nav-tile-text">Rury</span>
                        </a>
                        <a href="app.html#/kartoteka" target="_parent" class="nav-tile">
                            <span class="nav-tile-icon"><i data-lucide="archive"></i></span>
                            <span class="nav-tile-text">Kartoteka</span>
                        </a>
                    </div>
                </div>
                <div class="header-center">
                    <nav class="nav">
                        <button type="button"
                            class="nav-btn nav-tile active"
                            data-section="builder"
                            id="nav-builder"
                            style="--nav-accent: #10b981; --nav-glow: #0d2b22"
                            onclick="showSection('builder')"
                        >
                            <span class="nav-tile-icon"><i data-lucide="hard-hat"></i></span>
                            <span class="nav-tile-text">Konfiguracja</span>
                        </button>
                        <button type="button"
                            class="nav-btn nav-tile"
                            data-section="offer"
                            id="nav-offer"
                            style="--nav-accent: #3b82f6; --nav-glow: #152040"
                            onclick="showSection('offer')"
                        >
                            <span class="nav-tile-icon"><i data-lucide="bar-chart-2"></i></span>
                            <span class="nav-tile-text">Oferta</span>
                        </button>
                        <button type="button"
                            class="nav-btn nav-tile"
                            data-section="pricelist"
                            id="nav-pricelist"
                            style="--nav-accent: #8b5cf6; --nav-glow: #1e1540"
                            onclick="showSection('pricelist')"
                        >
                            <span class="nav-tile-icon"><i data-lucide="clipboard-list"></i></span>
                            <span class="nav-tile-text">Cennik</span>
                        </button>
                    </nav>
                </div>
                <div class="header-right">
                    <div
                        id="header-user-info"
                        class="gap-2"
                        style="display: flex; align-items: center; font-size: 0.78rem"
                    >
                        <span
                            id="header-username"
                            style="color: var(--text-secondary); font-weight: 500"
                        ></span>
                        <span
                            id="header-role-badge"
                            style="
                                font-size: 0.6rem;
                                padding: 0.15rem 0.5rem;
                                border-radius: 20px;
                                font-weight: 600;
                                text-transform: uppercase;
                                letter-spacing: 0.3px;
                                margin-right: 0.5rem;
                            "
                        ></span>

                        <button type="button"
                            onclick="appLogout()"
                            style="
                                padding: 0.35rem 0.8rem;
                                border: 1px solid var(--border-glass);
                                border-radius: 6px;
                                background: var(--bg-glass);
                                color: var(--text-muted);
                                font:
                                    500 0.75rem 'Inter',
                                    sans-serif;
                                cursor: pointer;
                                transition: all 0.2s;
                            "
                            onmouseenter="
                                this.style.color = '#f87171';
                                this.style.borderColor = '#3a1a1a';
                            "
                            onmouseleave="
                                this.style.color = 'var(--text-muted)';
                                this.style.borderColor = 'var(--border-glass)';
                            "
                        >
                            Wyloguj
                        </button>
                    </div>
                </div>
            </div>
        </header>
