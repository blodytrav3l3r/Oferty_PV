<!-- ===== FIXED PASEEK PODSUMOWANIA OFERTY (KROK 3) ===== -->
<div class="rury-summary-bar" id="rury-summary-bar" style="display: none">
    <div class="rury-summary-grid">
        <div class="rury-summary-card">
            <div class="rury-summary-label">Cena Netto</div>
            <div class="rury-summary-value accent" id="sum-netto-products">0,00 PLN</div>
        </div>
        <div
            class="rury-summary-card has-borders"
            onclick="openRuryTransportPopup()"
            style="cursor: pointer; transition: background 0.2s"
            onmouseover="this.style.background = 'rgba(255,255,255,0.05)'"
            onmouseout="this.style.background = 'transparent'"
            title="Kliknij aby zmienić koszt transportu"
        >
            <div class="rury-summary-label">Koszt transportu</div>
            <div
                class="rury-summary-value warn gap-2"
                id="sum-transport-cost"
                style="display: flex; align-items: center; justify-content: center"
            >
                <i data-lucide="truck" style="width: 20px; height: 20px"></i> 0,00 PLN
            </div>
            <div
                id="rury-active-transport-info"
                style="
                    font-size: 0.72rem;
                    color: #94a3b8;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    line-height: 1.3;
                    text-align: center;
                    margin-top: 0.15rem;
                "
            >
                <div style="margin-bottom: 2px">
                    Ilość aut:
                    <span style="color: #cbd5e1; font-weight: 600" id="rury-transport-count"
                        >0</span
                    >
                </div>
                <div>
                    Cena rejsu:
                    <span style="color: #cbd5e1; font-weight: 600" id="rury-transport-rate"
                        >0,00 PLN</span
                    >
                </div>
            </div>
        </div>
        <div class="rury-summary-card">
            <div class="rury-summary-label">Zabezpieczenie transportu</div>
            <div
                class="rury-summary-value"
                id="sum-zabezpieczenie"
                style="font-size: 1rem; font-weight: 700; color: var(--text-primary)"
            >
                0,00 PLN
            </div>
        </div>
        <div class="rury-summary-card">
            <div class="rury-summary-label">RAZEM Netto</div>
            <div class="rury-summary-value-lg" id="sum-total-netto">0,00 PLN</div>
            <div class="rury-summary-sub" id="sum-brutto-details">Brutto: 0,00 PLN</div>
        </div>
        <div class="rury-summary-card" style="border-left: 1px solid var(--border-glass)">
            <button type="button" class="rury-btn-discount" onclick="showItemDiscountModal()">
                % Edytuj rabaty
            </button>
        </div>
        <!-- Akcje oferty -->
        <div
            class="rury-summary-card rury-summary-actions"
            style="border-left: 1px solid var(--border-glass)"
        >
            <button type="button"
                class="rury-action-btn rury-action-btn--print"
                onclick="showUniversalPrintModalRury(editingOfferId)"
            >
                <i data-lucide="printer"></i> Wydruk
            </button>
            <button type="button"
                class="rury-action-btn rury-action-btn--save"
                id="btn-save-offer-order"
                onclick="saveOfferOrOrder()"
            >
                <i data-lucide="save"></i> Zapisz ofertę
            </button>
            <button type="button"
                class="rury-action-btn rury-action-btn--order"
                id="btn-order-create"
                onclick="createOrderFromOffer()"
            >
                <i data-lucide="shopping-cart"></i> Utwórz zamówienie
            </button>
        </div>
    </div>
</div>
