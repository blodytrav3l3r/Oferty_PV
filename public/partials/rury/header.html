<!-- HEADER -->
<header class="header">
    <div class="header-inner">
        <div class="header-left">
            <div class="logo logo-rury">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="2">
                    <defs>
                        <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" class="logo-stop-start" />
                            <stop offset="100%" class="logo-stop-end" />
                        </linearGradient>
                    </defs>
                    <circle cx="12" cy="12" r="9" />
                    <path d="M12 3v18M3 12h18M7 7l10 10M17 7L7 17" />
                </svg>
                <span>Oferty rury</span>
            </div>

            <div class="nav-apps">
                <a href="index.html" target="_parent" class="nav-tile">
                    <span class="nav-tile-icon"><i data-lucide="home"></i></span>
                    <span class="nav-tile-text">Pulpit</span>
                </a>
                <a href="app.html#/studnie" target="_parent" class="nav-tile">
                    <span class="nav-tile-icon"><i data-lucide="cylinder"></i></span>
                    <span class="nav-tile-text">Studnie</span>
                </a>
                <a
                    href="app.html#/rury"
                    target="_parent"
                    class="nav-tile active"
                    style="--nav-accent: var(--accent); --nav-glow: var(--accent-bg)"
                >
                    <span class="nav-tile-icon"
                        ><i data-lucide="cylinder" class="lucide-rotate-n90"></i
                    ></span>
                    <span class="nav-tile-text">Rury</span>
                </a>
                <a href="app.html#/kartoteka" target="_parent" class="nav-tile">
                    <span class="nav-tile-icon"><i data-lucide="archive"></i></span>
                    <span class="nav-tile-text">Kartoteka</span>
                </a>
            </div>
        </div>

        <div class="header-center">
            <nav class="nav">
                <button type="button"
                    class="nav-btn nav-tile active nav-accent-builder"
                    data-section="builder"
                    id="nav-builder"
                >
                    <span class="nav-tile-icon"><i data-lucide="edit"></i></span>
                    <span class="nav-tile-text">Konfiguracja</span>
                </button>
                <button type="button"
                    class="nav-btn nav-tile nav-accent-offer"
                    data-section="offer"
                    id="nav-offer"
                >
                    <span class="nav-tile-icon"><i data-lucide="bar-chart-2"></i></span>
                    <span class="nav-tile-text">Oferta</span>
                </button>
                <button type="button"
                    class="nav-btn nav-tile nav-accent-pricelist"
                    data-section="pricelist"
                    id="nav-pricelist"
                >
                    <span class="nav-tile-icon"><i data-lucide="clipboard-list"></i></span>
                    <span class="nav-tile-text">Cennik</span>
                </button>
            </nav>
        </div>

        <div class="header-right">
            <div id="header-user-info" class="rury-header-user">
                <span id="header-username" class="rury-header-username"></span>
                <span id="header-role-badge" class="rury-role-badge"></span>
                <button type="button" onclick="appLogout()" class="rury-btn-logout">Wyloguj</button>
            </div>
        </div>
    </div>
</header>
