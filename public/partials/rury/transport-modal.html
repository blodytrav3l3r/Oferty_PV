<!-- PARTIAL: transport-modal.html -->
<!-- ===== OFFER TRANSPORT MODAL (Rury) ===== -->
<div id="rury-transport-modal" class="modal-overlay" style="display: none; z-index: 10000">
    <div
        style="
            background: var(--bg-secondary);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            width: 95%;
            max-width: 820px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        "
    >
        <div
            style="
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 1rem 1.5rem;
                background: rgba(0, 0, 0, 0.2);
                border-bottom: 1px solid var(--border-glass);
            "
        >
            <div
                id="rury-transport-modal-title"
                class="gap-2"
                style="
                    font-weight: 800;
                    font-size: 0.9rem;
                    display: flex;
                    align-items: center;
                    color: #eab308;
                "
            >
                <i data-lucide="truck" style="width: 18px; height: 18px"></i> Koszty Transportu
            </div>
            <button type="button"
                class="btn btn-icon"
                onclick="handleRuryTransportCancel()"
                style="color: var(--text-muted)"
            >
                <i data-lucide="x" style="width: 16px; height: 16px"></i>
            </button>
        </div>
        <div style="padding: 2rem 1.5rem">
            <p
                style="
                    color: var(--text-muted);
                    margin-bottom: 1.75rem;
                    font-size: 0.72rem;
                    line-height: 1.5;
                "
            >
                Wprowadź dystans oraz stawkę. Formularz jest zsynchronizowany z danymi oferty i
                ulegnie przedawnieniu tylko po odrzuceniu zmian.
            </p>
            <div class="gap-4" style="display: flex; align-items: flex-end">
                <div class="form-group" style="flex: 1; margin: 0">
                    <label
                        style="
                            font-size: 0.65rem;
                            color: var(--text-muted);
                            margin-bottom: 0.6rem;
                            display: block;
                            font-weight: 600;
                        "
                        >Odległość (km)</label
                    >
                    <input
                        type="number"
                        id="rury-transport-modal-km"
                        class="input-modern"
                        style="
                            width: 100%;
                            font-size: 0.9rem;
                            font-weight: 700;
                            padding: 0.75rem;
                            text-align: center;
                            border-radius: 12px;
                            border: 1px solid var(--border-glass);
                            background: rgba(0, 0, 0, 0.2);
                            color: var(--text-heading);
                        "
                        min="0"
                        oninput="
                            if (typeof syncRuryTransportFromModal === 'function')
                                syncRuryTransportFromModal();
                        "
                    />
                </div>
                <div class="form-group" style="flex: 1; margin: 0">
                    <label
                        style="
                            font-size: 0.65rem;
                            color: var(--text-muted);
                            margin-bottom: 0.6rem;
                            display: block;
                            font-weight: 600;
                        "
                        >Stawka (PLN/km)</label
                    >
                    <input
                        type="number"
                        id="rury-transport-modal-rate"
                        class="input-modern"
                        style="
                            width: 100%;
                            font-size: 0.9rem;
                            font-weight: 700;
                            padding: 0.75rem;
                            text-align: center;
                            border-radius: 12px;
                            border: 1px solid var(--border-glass);
                            background: rgba(0, 0, 0, 0.2);
                            color: var(--text-heading);
                        "
                        min="0"
                        step="0.01"
                        oninput="
                            if (typeof syncRuryTransportFromModal === 'function')
                                syncRuryTransportFromModal();
                        "
                    />
                </div>
            </div>
            <div
                style="
                    margin-top: 0.8rem;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 0.6rem;
                "
            >
                <label style="font-size: 0.65rem; color: var(--text-muted); font-weight: 600"
                    >Tryb transportu:</label
                >
                <button type="button"
                    id="rury-transport-mode-btn"
                    type="button"
                    onclick="toggleRuryTransportMode()"
                    style="
                        display: inline-flex;
                        align-items: center;
                        gap: 0.35rem;
                        padding: 0.3rem 0.7rem;
                        border-radius: 8px;
                        border: 1px solid var(--border-glass);
                        background: rgba(0, 0, 0, 0.2);
                        color: var(--text-heading);
                        font-size: 0.7rem;
                        font-weight: 700;
                        cursor: pointer;
                        transition: all 0.15s;
                    "
                >
                    <i data-lucide="truck" style="width: 12px; height: 12px"></i>
                    <span id="rury-transport-mode-label">Pełne</span>
                </button>
            </div>
            <div
                id="rury-transport-modal-trips-info"
                style="
                    margin-top: 1rem;
                    text-align: center;
                    font-size: 0.7rem;
                    color: var(--text-muted);
                "
            ></div>
            <div
                id="rury-transport-modal-cost-details"
                class="gap-3"
                style="margin-top: 1rem; display: grid; grid-template-columns: 1fr 1fr 1fr"
            >
                <div
                    style="
                        background: rgba(0, 0, 0, 0.2);
                        border: 1px solid var(--border-glass);
                        padding: 0.75rem;
                        border-radius: 10px;
                        text-align: center;
                    "
                >
                    <div
                        style="
                            font-size: 0.6rem;
                            color: var(--text-muted);
                            text-transform: uppercase;
                            font-weight: 700;
                            margin-bottom: 0.3rem;
                            letter-spacing: 1px;
                        "
                    >
                        Koszt / transport
                    </div>
                    <div
                        id="rury-transport-modal-cost-per-trip"
                        style="font-size: 0.9rem; font-weight: 800; color: #fbbf24"
                    >
                        0 PLN
                    </div>
                </div>
                <div
                    style="
                        background: rgba(0, 0, 0, 0.2);
                        border: 1px solid var(--border-glass);
                        padding: 0.75rem;
                        border-radius: 10px;
                        text-align: center;
                    "
                >
                    <div
                        style="
                            font-size: 0.6rem;
                            color: var(--text-muted);
                            text-transform: uppercase;
                            font-weight: 700;
                            margin-bottom: 0.3rem;
                            letter-spacing: 1px;
                        "
                    >
                        Ilość transportów
                    </div>
                    <div
                        id="rury-transport-modal-count"
                        style="font-size: 0.9rem; font-weight: 800; color: #60a5fa"
                    >
                        0
                    </div>
                </div>
                <div
                    style="
                        background: rgba(0, 0, 0, 0.2);
                        border: 1px solid var(--border-glass);
                        padding: 0.75rem;
                        border-radius: 10px;
                        text-align: center;
                    "
                >
                    <div
                        style="
                            font-size: 0.6rem;
                            color: var(--text-muted);
                            text-transform: uppercase;
                            font-weight: 700;
                            margin-bottom: 0.3rem;
                            letter-spacing: 1px;
                        "
                    >
                        Koszt transportu
                    </div>
                    <div
                        id="rury-transport-modal-total-cost"
                        style="font-size: 0.9rem; font-weight: 800; color: #34d399"
                    >
                        0 PLN
                    </div>
                </div>
            </div>
            <div
                style="
                    margin-top: 1.75rem;
                    text-align: center;
                    background: rgba(0, 0, 0, 0.3);
                    border: 1px dashed var(--border-glass);
                    padding: 1rem;
                    border-radius: 12px;
                "
            >
                <div
                    style="
                        font-size: 0.65rem;
                        color: var(--text-muted);
                        text-transform: uppercase;
                        font-weight: 700;
                        margin-bottom: 0.25rem;
                        letter-spacing: 2px;
                    "
                >
                    Aktualna Łączna Suma Netto
                </div>
                <div
                    id="rury-transport-modal-total-val"
                    style="
                        font-size: 1.05rem;
                        font-weight: 900;
                        color: var(--success);
                        letter-spacing: -1px;
                    "
                >
                    0 PLN
                </div>
            </div>
        </div>
        <div
            class="gap-3"
            style="
                padding: 1rem 1.5rem;
                border-top: 1px solid var(--border-glass);
                background: rgba(0, 0, 0, 0.2);
                display: flex;
                justify-content: flex-end;
            "
        >
            <button type="button"
                class="btn btn-secondary"
                onclick="handleRuryTransportCancel()"
                style="font-size: 0.7rem; padding: 0.4rem 1rem; font-weight: 700"
            >
                Zamknij
            </button>
            <button type="button"
                class="btn btn-primary"
                onclick="handleRuryTransportSave()"
                style="font-size: 0.7rem; padding: 0.4rem 1.2rem; font-weight: 800"
            >
                <i data-lucide="check" style="width: 11px; height: 11px; margin-right: 0.25rem"></i>
                Zastosuj
            </button>
        </div>
    </div>
</div>
